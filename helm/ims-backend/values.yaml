# Default values for ims-backend.
replicaCount: 2

image:
  repository: ims-backend
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ims.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ims-backend-tls
      hosts:
        - ims.local

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/actuator/prometheus"
  prometheus.io/port: "8080"

config:
  dbUrl: "jdbc:postgresql://postgres-service:5432/ims_db"
  dbUser: "ims_user"
  redisHost: "redis-service"
  redisPort: 6379

secrets:
  dbPassword: "change-me"
  redisPassword: "change-me"
  jwtSecret: "replace-with-secure-key"
  encryptionKey: "01234567890123456789012345678901"
