name: IMS CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      # Testcontainers will start its own Postgres.
      # Keeping Redis as it's used directly by some rate-limiting integration tests.
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Redis
        run: |
          for i in {1..10}; do
            redis-cli -h localhost ping && break
            sleep 2
          done

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Maven
        run: ./mvnw clean verify -DforkCount=1 -DreuseForks=false
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          # Fixed JWT_SECRET: Use valid base64 (CI-02)
          JWT_SECRET: "dGVzdC1zZWNyZXQta2V5LWZvci1jaS10ZXN0aW5nLW9ubHktMTIzNDU2Nzg="
          # Fixed APP_ENCRYPTION_KEY: Ensure 32 bytes
          APP_ENCRYPTION_KEY: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
          JASYPT_ENCRYPTOR_PASSWORD: "test-encryptor-ci"

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy:
    name: Deploy to Kubernetes
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          [ -z "${{ secrets.KUBECONFIG }}" ] && echo "Missing KUBECONFIG" && exit 1
          [ -z "${{ secrets.DB_PASSWORD }}" ] && echo "Missing DB_PASSWORD" && exit 1
          [ -z "${{ secrets.REDIS_PASSWORD }}" ] && echo "Missing REDIS_PASSWORD" && exit 1
          [ -z "${{ secrets.JWT_SECRET }}" ] && echo "Missing JWT_SECRET" && exit 1
          [ -z "${{ secrets.APP_ENCRYPTION_KEY }}" ] && echo "Missing APP_ENCRYPTION_KEY" && exit 1

      - name: Validate kubeconfig encoding
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > /dev/null || (echo "Invalid base64 kubeconfig" && exit 1)

      - name: Set up Kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy via Helm
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
        run: |
          helm upgrade --install ims-backend ./helm/ims-backend \
            --namespace ims-production --create-namespace \
            --set image.tag=sha-${{ github.sha }} \
            --set secrets.dbPassword="$DB_PASSWORD" \
            --set secrets.redisPassword="$REDIS_PASSWORD" \
            --set secrets.jwtSecret="$JWT_SECRET" \
            --set secrets.encryptionKey="$APP_ENCRYPTION_KEY" \
            --atomic --timeout 5m
          kubectl rollout status deployment/ims-backend -n ims-production

