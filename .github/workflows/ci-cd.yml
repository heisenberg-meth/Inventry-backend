name: IMS CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ims_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean install
        env:
          DB_URL: jdbc:postgresql://localhost:5432/ims_test
          DB_USER: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: "36c84c164a6d4e2a8c3d9b4f6e8a1d2c3b4a5d6e7f8g9h0i1j2k3l4m5n6o7p8q9r0s" # dummy secret for tests
          APP_ENCRYPTION_KEY: "01234567890123456789012345678901" # 32 bytes

      - name: Build Docker Image
        run: docker build -t ims-backend:latest .

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy:
    name: Deploy to Kubernetes
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Kubeconfig
        # This is a placeholder for actual kubeconfig setup
        # In a real scenario, you'd use a secret: echo "${{ secrets.KUBECONFIG }}" > kubeconfig
        run: echo "Skipping actual deployment as no Kubeconfig provided"

      - name: Deploy to K8s
        run: |
          # kubectl apply -f k8s/
          echo "Deployment command would run here"
