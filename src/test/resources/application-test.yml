spring:
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        multiTenancy: NONE
        cache:
          use_second_level_cache: false
          use_query_cache: false
        cache.region.factory_class: org.hibernate.cache.internal.NoCachingRegionFactory

  cache:
    type: none

  flyway:
    enabled: true

  data:
    redis:
      repositories:
        enabled: false

management:
  health:
    redis:
      enabled: false
app:
  test:
    mode: true
