spring:
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        multiTenancy: DISCRIMINATOR
        cache:
          use_second_level_cache: false
          use_query_cache: false
    show-sql: true

  flyway:
    enabled: false
    ignore-missing-migrations: true
    ignore-ignored-migrations: true
    ignore-duplicate-migration-locations: true

  cache:
    type: none

  http:
    client:
      factory: simple

app:
  jwt:
    secret: "test-secret-key-at-least-32-chars-long-for-jwt-signing"
  security:
    encryption-key: "01234567890123456789012345678901"
