spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      idle-timeout: 10000
      max-lifetime: 30000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        # multiTenancy: NONE
  cache:
    type: none
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: test-only-secret-do-not-use-in-production-000000000000000000000000
    expiry-seconds: 86400
    refresh-expiry-seconds: 604800
  cache:
    product-ttl-minutes: 15
    stock-ttl-minutes: 5
    report-ttl-minutes: 30
    tenant-ttl-hours: 1
  rate-limit:
    auth-rpm: 20
    public-rpm: 50
    authenticated-rpm: 200
    window-seconds: 60

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework: DEBUG
