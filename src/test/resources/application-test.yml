spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        multiTenancy: NONE
        cache:
          "[use_second_level_cache]": false
          "[use_query_cache]": false
        "[cache.region.factory_class]": org.hibernate.cache.internal.NoCachingRegionFactory

  cache:
    type: none

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      password: password
      repositories:
        enabled: false

management:
  health:
    redis:
      enabled: false

app:
  jwt:
    secret: test-secret-key-32-characters-long-min-12345
  security:
    encryption-key: 12345678901234567890123456789012
  test:
    mode: true
