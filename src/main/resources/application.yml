spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ims_db}
    username: ${SPRING_DATASOURCE_USERNAME:ims_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ims@123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        # remove dialect if you want; Hibernate auto-detects PostgreSQL
        # dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379
      password: "ims@123"
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:86400}
    refresh-expiry-seconds: 604800

  cache:
    product-ttl-minutes: 15
    stock-ttl-minutes: 5
    report-ttl-minutes: 30
    tenant-ttl-hours: 1

  rate-limit:
    # Strict per-IP cap on /auth/** to mitigate credential stuffing / brute force.
    auth-rpm: ${APP_RATE_LIMIT_AUTH_RPM:20}
    # Per-IP cap on unauthenticated traffic.
    public-rpm: ${APP_RATE_LIMIT_PUBLIC_RPM:100}
    # Per-tenant+IP cap on authenticated API traffic.
    authenticated-rpm: ${APP_RATE_LIMIT_AUTHENTICATED_RPM:500}
    # Sliding-window size, in seconds.
    window-seconds: ${APP_RATE_LIMIT_WINDOW_SECONDS:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: always
    include-binding-errors: always
    include-exception: true

logging:
  level:
    com.ims: INFO
    org.springframework.security: INFO
    org.springdoc: DEBUG
    org.springframework.web: DEBUG
