apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ims-namespace
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager-service:9093']
    rule_files:
      - /etc/prometheus/rules.yml
    scrape_configs:
      - job_name: 'ims-backend'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['ims-service:80']
  rules.yml: |
    groups:
    - name: ims-alerts
      rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."
